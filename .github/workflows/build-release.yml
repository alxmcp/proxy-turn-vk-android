name: Build WDTT Release

on:
  push:
    branches:
      - "**"
  workflow_dispatch:
    inputs:
      tag_name:
        description: "Release tag. Defaults to v<app versionName>."
        required: false
        type: string
      release_name:
        description: "Release title. Defaults to WDTT <tag>."
        required: false
        type: string
      draft:
        description: "Create the GitHub release as a draft."
        required: false
        type: boolean
        default: false
      prerelease:
        description: "Mark the GitHub release as a prerelease."
        required: false
        type: boolean
        default: false
      publish_release:
        description: "Publish build artifacts to a GitHub release."
        required: false
        type: boolean
        default: true

jobs:
  build-release:
    name: Build release APK
    runs-on: ubuntu-latest

    permissions:
      contents: read

    outputs:
      version_name: ${{ steps.app_version.outputs.version_name }}
      version_code: ${{ steps.app_version.outputs.version_code }}

    env:
      ANDROID_MIN_API: "29"
      ANDROID_COMPILE_SDK: "35"
      ANDROID_BUILD_TOOLS: "35.0.0"
      ANDROID_NDK_VERSION: "27.2.12479018"
      SERVER_BINARY_NAME: "server"

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Read app version
        id: app_version
        shell: bash
        run: |
          set -euo pipefail

          version_name="$(sed -nE 's/.*versionName = "([^"]+)".*/\1/p' app/build.gradle.kts | head -n1)"
          version_code="$(sed -nE 's/.*versionCode = ([0-9]+).*/\1/p' app/build.gradle.kts | head -n1)"

          if [ -z "$version_name" ] || [ -z "$version_code" ]; then
            echo "::error::Unable to read versionName/versionCode from app/build.gradle.kts"
            exit 1
          fi

          echo "version_name=$version_name" >> "$GITHUB_OUTPUT"
          echo "version_code=$version_code" >> "$GITHUB_OUTPUT"

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android SDK packages
        shell: bash
        run: |
          set -euo pipefail

          sdkmanager \
            "platforms;android-${ANDROID_COMPILE_SDK}" \
            "build-tools;${ANDROID_BUILD_TOOLS}" \
            "ndk;${ANDROID_NDK_VERSION}"

          echo "ANDROID_NDK_HOME=${ANDROID_SDK_ROOT}/ndk/${ANDROID_NDK_VERSION}" >> "$GITHUB_ENV"

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.26.x"
          cache: true
          cache-dependency-path: |
            go.mod
            go_client/go.mod

      - name: Generate Go sums
        shell: bash
        run: |
          set -euo pipefail

          echo "== Root Go module =="
          go mod tidy

          echo "== Go client module =="
          cd go_client
          go mod tidy

      - name: Build Linux server binaries
        shell: bash
        run: |
          set -euo pipefail

          mkdir -p build/server

          echo "== Build server linux/amd64 =="
          CGO_ENABLED=0 GOOS=linux GOARCH=amd64 \
            go build \
              -trimpath \
              -ldflags="-s -w -checklinkname=0" \
              -o build/server/wdtt-server-linux-amd64 \
              ./server.go

          echo "== Build server linux/arm64 =="
          CGO_ENABLED=0 GOOS=linux GOARCH=arm64 \
            go build \
              -trimpath \
              -ldflags="-s -w -checklinkname=0" \
              -o build/server/wdtt-server-linux-arm64 \
              ./server.go

          chmod +x build/server/wdtt-server-linux-amd64
          chmod +x build/server/wdtt-server-linux-arm64

      - name: Put server binary into Android assets
        shell: bash
        run: |
          set -euo pipefail

          mkdir -p app/src/main/assets

          # Android deploy code expects this exact asset name.
          cp build/server/wdtt-server-linux-amd64 app/src/main/assets/${SERVER_BINARY_NAME}
          chmod +x app/src/main/assets/${SERVER_BINARY_NAME}

          echo "Server asset:"
          ls -lh app/src/main/assets/${SERVER_BINARY_NAME}

      - name: Build Android Go client binaries
        shell: bash
        run: |
          set -euo pipefail

          NDK_ROOT="${ANDROID_NDK_HOME}"
          TOOLCHAIN="$NDK_ROOT/toolchains/llvm/prebuilt/linux-x86_64/bin"

          if [ ! -d "$TOOLCHAIN" ]; then
            echo "Android NDK toolchain not found: $TOOLCHAIN"
            exit 1
          fi

          echo "Using NDK: $NDK_ROOT"
          echo "Using toolchain: $TOOLCHAIN"

          mkdir -p app/src/main/jniLibs/arm64-v8a
          mkdir -p app/src/main/jniLibs/armeabi-v7a
          mkdir -p app/src/main/jniLibs/x86_64
          mkdir -p build/go-client

          cd go_client

          echo "== Build libclient.so for arm64-v8a =="
          CGO_ENABLED=1 \
          GOOS=android \
          GOARCH=arm64 \
          CC="$TOOLCHAIN/aarch64-linux-android${ANDROID_MIN_API}-clang" \
            go build \
              -trimpath \
              -ldflags="-checklinkname=0 -s -w" \
              -o ../app/src/main/jniLibs/arm64-v8a/libclient.so \
              .
          chmod +x ../app/src/main/jniLibs/arm64-v8a/libclient.so

          cp ../app/src/main/jniLibs/arm64-v8a/libclient.so \
             ../build/go-client/libclient-arm64-v8a.so

          echo "== Build libclient.so for armeabi-v7a =="
          CGO_ENABLED=1 \
          GOOS=android \
          GOARCH=arm \
          GOARM=7 \
          CC="$TOOLCHAIN/armv7a-linux-androideabi${ANDROID_MIN_API}-clang" \
            go build \
              -trimpath \
              -ldflags="-checklinkname=0 -s -w" \
              -o ../app/src/main/jniLibs/armeabi-v7a/libclient.so \
              .
          chmod +x ../app/src/main/jniLibs/armeabi-v7a/libclient.so

          cp ../app/src/main/jniLibs/armeabi-v7a/libclient.so \
             ../build/go-client/libclient-armeabi-v7a.so

          echo "== Build libclient.so for x86_64 =="
          CGO_ENABLED=1 \
          GOOS=android \
          GOARCH=amd64 \
          CC="$TOOLCHAIN/x86_64-linux-android${ANDROID_MIN_API}-clang" \
            go build \
              -trimpath \
              -ldflags="-checklinkname=0 -s -w" \
              -o ../app/src/main/jniLibs/x86_64/libclient.so \
              .
          chmod +x ../app/src/main/jniLibs/x86_64/libclient.so

          cp ../app/src/main/jniLibs/x86_64/libclient.so \
             ../build/go-client/libclient-x86_64.so

          cd ..

          echo "Built JNI libraries:"
          find app/src/main/jniLibs -type f -name "libclient.so" -exec ls -lh {} \;

      - name: Verify Android runtime files
        shell: bash
        run: |
          set -euo pipefail

          required_files=(
            "app/src/main/assets/${SERVER_BINARY_NAME}"
            "app/src/main/jniLibs/arm64-v8a/libclient.so"
            "app/src/main/jniLibs/armeabi-v7a/libclient.so"
            "app/src/main/jniLibs/x86_64/libclient.so"
          )

          for file in "${required_files[@]}"; do
            if [ ! -f "$file" ]; then
              echo "::error::Missing Android runtime file: $file"
              exit 1
            fi
            ls -lh "$file"
          done

      - name: Make Gradle wrapper executable
        shell: bash
        run: chmod +x ./gradlew

      - name: Decode release keystore
        shell: bash
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
        run: |
          set -euo pipefail

          missing=()
          for name in ANDROID_KEYSTORE_BASE64 ANDROID_KEYSTORE_PASSWORD ANDROID_KEY_ALIAS; do
            if [ -z "${!name}" ]; then
              missing+=("$name")
            fi
          done
          if [ "${#missing[@]}" -ne 0 ]; then
            echo "::error::Missing required signing secret(s): ${missing[*]}"
            exit 1
          fi

          rm -f release.keystore local.properties signing.env
          umask 077
          printf '%s' "$ANDROID_KEYSTORE_BASE64" | base64 --decode > release.keystore

          keytool -list \
            -keystore release.keystore \
            -storepass "$ANDROID_KEYSTORE_PASSWORD" \
            -alias "$ANDROID_KEY_ALIAS" >/dev/null

          echo "Decoded release keystore"

      - name: Build Android release APK
        shell: bash
        run: |
          set -euo pipefail

          # No local.properties is created here, so Gradle produces unsigned release APKs.
          # The workflow signs them manually in the next step using apksigner.
          ./gradlew clean :app:assembleRelease --stacktrace

      - name: Sign release APKs manually
        shell: bash
        env:
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          set -euo pipefail

          key_password="${ANDROID_KEY_PASSWORD:-$ANDROID_KEYSTORE_PASSWORD}"

          BUILD_TOOLS="$(find "$ANDROID_HOME/build-tools" -mindepth 1 -maxdepth 1 -type d | sort -V | tail -n 1)"
          ZIPALIGN="$BUILD_TOOLS/zipalign"
          APKSIGNER="$BUILD_TOOLS/apksigner"

          echo "Using zipalign: $ZIPALIGN"
          echo "Using apksigner: $APKSIGNER"

          mkdir -p build/signed-apk
          shopt -s nullglob
          unsigned_apks=(app/build/outputs/apk/release/*-unsigned.apk)

          if [ ${#unsigned_apks[@]} -eq 0 ]; then
            echo "No unsigned release APKs found"
            echo "Available APK outputs:"
            find app/build/outputs/apk -type f -name "*.apk" -print || true
            exit 1
          fi

          for apk in "${unsigned_apks[@]}"; do
            name="$(basename "$apk" -unsigned.apk)"
            aligned="build/signed-apk/${name}-aligned.apk"
            signed="build/signed-apk/${name}-signed.apk"

            echo "== Align $apk =="
            "$ZIPALIGN" -p -f 4 "$apk" "$aligned"

            echo "== Sign $aligned =="
            "$APKSIGNER" sign               --ks release.keystore               --ks-key-alias "$ANDROID_KEY_ALIAS"               --ks-pass "pass:$ANDROID_KEYSTORE_PASSWORD"               --key-pass "pass:$key_password"               --v1-signing-enabled true               --v2-signing-enabled true               --v3-signing-enabled true               --v4-signing-enabled false               --out "$signed"               "$aligned"

            echo "== Verify $signed =="
            "$APKSIGNER" verify               --verbose               --print-certs               "$signed"
          done

          echo "Signed APKs:"
          ls -lh build/signed-apk/*-signed.apk

      - name: Collect build outputs
        shell: bash
        run: |
          set -euo pipefail

          mkdir -p build/artifacts/apk
          mkdir -p build/artifacts/server
          mkdir -p build/artifacts/go-client

          echo "== Signed APK outputs =="
          find build/signed-apk -type f -name "*-signed.apk" -print -exec ls -lh {} \;

          cp build/signed-apk/*-signed.apk build/artifacts/apk/
          cp build/server/* build/artifacts/server/
          cp build/go-client/* build/artifacts/go-client/

          echo "== Final artifacts =="
          find build/artifacts -type f -exec ls -lh {} \;

      - name: Upload release APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: WDTT-release-apk
          path: build/artifacts/apk/*.apk
          if-no-files-found: error
          retention-days: 14

      - name: Upload server binaries artifact
        uses: actions/upload-artifact@v4
        with:
          name: WDTT-server-binaries
          path: build/artifacts/server/*
          if-no-files-found: error
          retention-days: 14

      - name: Upload Go client libraries artifact
        uses: actions/upload-artifact@v4
        with:
          name: WDTT-go-client-libraries
          path: build/artifacts/go-client/*
          if-no-files-found: error
          retention-days: 14

  publish-release:
    name: Publish GitHub release
    needs: build-release
    if: ${{ github.event_name == 'workflow_dispatch' && inputs.publish_release }}
    runs-on: ubuntu-latest

    permissions:
      contents: write
      actions: read

    steps:
      - name: Download APK artifact
        uses: actions/download-artifact@v4
        with:
          name: WDTT-release-apk
          path: release-assets/apk

      - name: Download server binaries artifact
        uses: actions/download-artifact@v4
        with:
          name: WDTT-server-binaries
          path: release-assets/server

      - name: Download Go client libraries artifact
        uses: actions/download-artifact@v4
        with:
          name: WDTT-go-client-libraries
          path: release-assets/go-client

      - name: Resolve release metadata
        shell: bash
        env:
          VERSION_NAME: ${{ needs.build-release.outputs.version_name }}
          RELEASE_TAG_INPUT: ${{ inputs.tag_name }}
          RELEASE_NAME_INPUT: ${{ inputs.release_name }}
        run: |
          set -euo pipefail

          release_tag="${RELEASE_TAG_INPUT:-}"
          if [ -z "$release_tag" ]; then
            release_tag="v${VERSION_NAME}"
          fi

          release_name="${RELEASE_NAME_INPUT:-}"
          if [ -z "$release_name" ]; then
            release_name="WDTT ${release_tag}"
          fi

          echo "RELEASE_TAG=$release_tag" >> "$GITHUB_ENV"
          echo "RELEASE_NAME=$release_name" >> "$GITHUB_ENV"

      - name: Generate checksums
        shell: bash
        run: |
          set -euo pipefail

          (
            cd release-assets
            find . -type f | sort | while read -r file; do
              sha256sum "$file"
            done
          ) > release-assets/SHA256SUMS.txt

      - name: Publish GitHub release
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_DRAFT: ${{ inputs.draft }}
          RELEASE_PRERELEASE: ${{ inputs.prerelease }}
        run: |
          set -euo pipefail

          if gh release view "$RELEASE_TAG" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
            echo "::error::Release ${RELEASE_TAG} already exists"
            exit 1
          fi

          cat > release-notes.md <<EOF
          Automated WDTT release for ${RELEASE_TAG}.

          Version: ${{ needs.build-release.outputs.version_name }}
          Commit: ${GITHUB_SHA}
          EOF

          args=()
          if [ "$RELEASE_DRAFT" = "true" ]; then
            args+=(--draft)
          fi
          if [ "$RELEASE_PRERELEASE" = "true" ]; then
            args+=(--prerelease)
          fi

          gh release create "$RELEASE_TAG" \
            release-assets/apk/*.apk \
            release-assets/server/* \
            release-assets/go-client/* \
            release-assets/SHA256SUMS.txt \
            --repo "$GITHUB_REPOSITORY" \
            --target "$GITHUB_SHA" \
            --title "$RELEASE_NAME" \
            --notes-file release-notes.md \
            "${args[@]}"
